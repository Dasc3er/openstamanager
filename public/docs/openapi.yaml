openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Endpoints
    description: ''
paths:
  '/api/errors/{status}{_format}':
    get:
      summary: 'Display a listing of the resource.'
      operationId: displayAListingOfTheResource
      description: ''
      parameters: []
      responses:
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  type: /errors/404
                  title: 'An error occurred'
                  status: 404
                  detail: ''
                properties:
                  type:
                    type: string
                    example: /errors/404
                  title:
                    type: string
                    example: 'An error occurred'
                  status:
                    type: integer
                    example: 404
                  detail:
                    type: string
                    example: ''
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: status
        description: ''
        example: architecto
        required: true
        schema:
          type: string
      -
        in: path
        name: _format
        description: 'Optional parameter.'
        required: true
        schema:
          type: string
        examples:
          omitted:
            summary: 'When the value is omitted'
            value: ''
          present:
            summary: 'When the value is present'
            value: .zmi
  '/api/contexts/{shortName}{_format}':
    get:
      summary: 'Generates a context according to the type requested.'
      operationId: generatesAContextAccordingToTheTypeRequested
      description: ''
      parameters: []
      responses:
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: ''
                properties:
                  message:
                    type: string
                    example: ''
